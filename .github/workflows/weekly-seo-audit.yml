name: Weekly SEO Audit (read-only)

# DISABLED 2026-06-01: The "Run AI Auto-Fixer" + "Commit and Push AI Fixes" steps
# rewrote app/layout.tsx global metadata from analytics that were never connected
# (GA4 Admin API was disabled) and auto-pushed to main — causing title/description
# thrash that suppresses rankings. Auto-schedule removed and the auto-commit/push
# step deleted below. Manual-only, read-only audit until rebuilt with a human gate.
on:
  workflow_dispatch: # Manual trigger only (auto-schedule disabled)

jobs:
  seo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run SEO Audit
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
          SEARCH_CONSOLE_SITE_URL: ${{ secrets.SEARCH_CONSOLE_SITE_URL }}
        run: npm run seo:audit:weekly

      # Read-only: upload the audit as an artifact for human review.
      # The former "AI Auto-Fixer" + "Commit and Push" steps were removed —
      # they rewrote app/layout.tsx metadata unsupervised and pushed to main.
      - name: Upload audit report (no auto-commit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-seo-audit
          path: audit-output/
          if-no-files-found: ignore
