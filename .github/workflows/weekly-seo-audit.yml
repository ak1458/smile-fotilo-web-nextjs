name: Weekly SEO Audit

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at 00:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  seo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run SEO Audit
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: npm run seo:audit:weekly
        
      - name: Run AI Auto-Fixer
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/seo/auto-fixer.mjs

      - name: Commit and Push AI Fixes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add app/layout.tsx audit-output/
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No SEO changes to commit."
          else
            git commit -m "🤖 AI SEO Update: Optimized global metadata based on weekly analytics"
            git push origin main
          fi
