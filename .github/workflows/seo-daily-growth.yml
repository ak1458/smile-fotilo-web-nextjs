name: Daily SEO & GMB Growth Engine

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install googleapis@133.0.0 axios@1.6.7
          # Force compatible gaxios version to fix mergeHeaders error
          npm install gaxios@6.3.0 --save

      - name: Verify Secrets
        run: |
          if [ -z "${{ secrets.GROQ_API_KEY }}" ]; then
            echo "⚠️ Warning: GROQ_API_KEY is not set"
          else
            echo "✅ GROQ_API_KEY is configured"
          fi
          if [ -z "${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "⚠️ Warning: GOOGLE_SERVICE_ACCOUNT_JSON is not set"
          else
            echo "✅ GOOGLE_SERVICE_ACCOUNT_JSON is configured"
          fi

      - name: Run SEO Optimizer
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SITE_URL: 'sc-domain:smilefotilo.com'
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > google-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=./google-key.json
          echo "🔍 Running SEO Optimizer..."
          node seo_optimizer.js || echo "⚠️ SEO Optimizer failed but continuing..."
          # GMB Autopilot (Staged - will succeed once API access is granted)
          node gmb_automated_poster.js || echo "⚠️ GMB Poster failed but continuing..."
          node gmb_review_manager.js || echo "⚠️ GMB Review Manager failed but continuing..."

      - name: Check for Changes
        id: check_changes
        run: |
          git status
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit AI Growth Strategy
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name 'Smile Bot'
          git config --global user.email 'bot@smilefotilo.com'
          git add strategy_output.json app/data/gmb-feed.json || true
          git commit -m "auto: daily AI growth strategy update - $(date -u +%Y-%m-%d)"
          git push
