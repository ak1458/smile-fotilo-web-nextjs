name: Daily SEO & GMB Growth Engine

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install googleapis axios

      - name: Run SEO Optimizer
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SITE_URL: 'sc-domain:smilefotilo.com'
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > google-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=./google-key.json
          node seo_optimizer.js
          # GMB Autopilot (Staged - will succeed once API access is granted)
          node gmb_automated_poster.js || echo "GMB API awaiting quota"
          node gmb_review_manager.js || echo "GMB API awaiting quota"

      - name: Commit AI Growth Strategy
        run: |
          git config --global user.name 'Smile Bot'
          git config --global user.email 'bot@smilefotilo.com'
          git add strategy_output.json app/data/gmb-feed.json
          git commit -m "auto: daily AI growth strategy update" || echo "No changes to commit"
          git push
