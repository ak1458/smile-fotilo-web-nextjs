name: Dependency Update Check

on:
  schedule:
    # Run weekly on Sundays at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Check for outdated dependencies
      run: |
        npm outdated --json > outdated-dependencies.json || true
        cat outdated-dependencies.json
        
    - name: Create issue if updates available
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          let content;
          try {
            const fileStr = fs.readFileSync('outdated-dependencies.json', 'utf8').trim();
            if (!fileStr) {
              console.log('File is empty. No outdated dependencies.');
              return;
            }
            content = JSON.parse(fileStr);
          } catch (e) {
            console.log('No outdated dependencies found or error reading file.', e.message);
            return;
          }
          
          if (Object.keys(content).length > 0) {
            const title = `📦 Dependency Updates Available - ${new Date().toISOString().split('T')[0]}`;
            let body = `## Outdated Dependencies\n\n| Package | Current | Wanted | Latest |\n| :--- | :--- | :--- | :--- |\n`;
            
            for (const [pkg, details] of Object.entries(content)) {
              body += `| ${pkg} | ${details.current} | ${details.wanted} | ${details.latest} |\n`;
            }
            
            body += `\n\nPlease review and update dependencies. Run \`npm update\` locally and test before deploying.`;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['dependencies', 'automated']
            });
          }
